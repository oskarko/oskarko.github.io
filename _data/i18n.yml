  about:
    title: Sobre mí
    lead: >
      Senior iOS Engineer con 10+ años entregando apps en producción para
      grandes empresas del sector fintech, salud, e-commerce y entertainment
      — desde arquitectura greenfield hasta entrega en App Store.
    body: >
      Empecé en 2014 programando mi primera app móvil como prácticas en
      Cádiz, sin saber que aquel primer proyecto marcaría el resto de mi
      carrera. Desde entonces he tenido la suerte de tocar muchos mundos:
      desde una startup europea hasta una casa de apuestas internacional,
      pasando por apps internas para grandes empresas del sector retail
      y financiero. Hoy trabajo como Tech Lead y contractor desde mi
      propia empresa, liderando equipos distribuidos y disfrutando de
      lo que mejor sé hacer: diseñar arquitecturas iOS desde cero. Y
      cuando puedo, enseño — porque enseñar es la mejor forma de seguir
      aprendiendo.
    highlights:
      - title: 10+ años
        text: "Apps en producción en App Store para grandes empresas nacionales e internacionales"
      - title: Tech Lead
        text: "He liderado equipos distribuidos de hasta 7 ingenieros y mentoreado juniors en múltiples proyectos"
      - title: Full SDLC
        text: "Desde arquitectura greenfield hasta CI/CD con Xcode Cloud, performance y entrega en App Store"
      - title: Enseñanza
        text: "Instructor de Swift (UIKit) en Keep Coding — top ratings en bootcamps"
