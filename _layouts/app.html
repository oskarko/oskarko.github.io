<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
	{%- include head.html -%}
</head>
<body class="page {{ page.slug }}" data-lang="{{ site.lang | default: 'es' }}">
	<div class="bg-aurora" aria-hidden="true">
		<div class="aurora aurora-1"></div>
		<div class="aurora aurora-2"></div>
		<div class="aurora aurora-3"></div>
	</div>

	<nav class="navbar glass" aria-label="{{ page.app_name }}">
		<div class="nav-inner">
			<a class="nav-brand" href="{{ '/' | relative_url }}">
				<span class="brand-mark" aria-hidden="true">
					<img src="{{ page.app_icon | relative_url }}" alt="" width="18" height="18" style="display:block;width:18px;height:18px;object-fit:cover;border-radius:4px;">
				</span>
				<span class="brand-name">{{ page.app_name }}</span>
			</a>

			<ul class="nav-links" role="list">
				<li><a href="{{ '/' | append: page.slug | append: '/support/' | relative_url }}" data-es="Soporte" data-en="Support">Soporte</a></li>
				<li><a href="{{ '/' | append: page.slug | append: '/privacy/' | relative_url }}" data-es="Privacidad" data-en="Privacy">Privacidad</a></li>
				<li><a href="{{ '/' | append: page.slug | append: '/terms/' | relative_url }}" data-es="Términos" data-en="Terms">Términos</a></li>
			</ul>

			<div class="lang-switch" role="group" aria-label="Idioma / Language">
				<button type="button" class="lang-btn is-active" data-set-lang="es" aria-label="Español">ES</button>
				<span class="lang-divider" aria-hidden="true">/</span>
				<button type="button" class="lang-btn" data-set-lang="en" aria-label="English">EN</button>
			</div>
		</div>
	</nav>

	<main class="page-main">
		{{ content }}
	</main>

	<footer class="site-footer {{ page.slug }}-footer">
		<div class="container">
			<ul class="footer-links" role="list">
				<li><a href="{{ '/' | append: page.slug | append: '/' | relative_url }}" data-es="Inicio" data-en="Home">Inicio</a></li>
				<li><a href="{{ '/' | append: page.slug | append: '/support/' | relative_url }}" data-es="Soporte" data-en="Support">Soporte</a></li>
				<li><a href="{{ '/' | append: page.slug | append: '/privacy/' | relative_url }}" data-es="Privacidad" data-en="Privacy">Privacidad</a></li>
				<li><a href="{{ '/' | append: page.slug | append: '/terms/' | relative_url }}" data-es="Términos" data-en="Terms">Términos</a></li>
				<li><a href="{{ '/' | relative_url }}">oscargarrucho.com</a></li>
			</ul>

			<p class="footer-disclaimer" data-es="{{ page.disclaimer_es }}" data-en="{{ page.disclaimer_en }}">{{ page.disclaimer_es }}</p>

			<p class="copyright">© {{ site.time | date: '%Y' }} Óscar R. Garrucho · {{ page.app_name }}</p>
		</div>
	</footer>

	<script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
