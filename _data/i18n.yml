  about:
    title: About me
    lead: >
      Senior iOS Engineer with 10+ years delivering production apps for
      leading national and international companies across fintech, health,
      e-commerce and entertainment — from greenfield architecture to App
      Store release.
    body: >
      Back in 2014 I shipped my first mobile app during a university
      internship in Cádiz — I had no idea that project would end up
      shaping my whole career. Since then I've moved through a bunch
      of different worlds: from a European startup to an international
      betting platform, working on internal apps for large retail and
      financial companies along the way. Today I work as Tech Lead and
      contractor from my own company, leading distributed teams and
      doing what I love most: designing iOS architectures from scratch.
      And whenever I get the chance, I teach — because teaching is
      honestly the best way to keep learning.
    highlights:
      - title: 10+ years
        text: "Production apps on the App Store for leading national and international companies"
      - title: Tech Lead
        text: "Led distributed teams of up to 7 engineers and mentored juniors across multiple projects"
      - title: Full SDLC
        text: "From greenfield architecture to CI/CD with Xcode Cloud, performance tuning and App Store delivery"
      - title: Teaching
        text: "Swift (UIKit) instructor at Keep Coding — top instructor ratings across bootcamp cohorts"
