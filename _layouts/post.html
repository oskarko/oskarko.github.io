---
layout: page
---

<article class="post container">
	<header class="post-head">
		<a class="post-back" href="{{ '/' | relative_url }}">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
			<span>{{ site.profile.name }}</span>
		</a>
		<h1 class="post-title">{{ page.title }}</h1>
		{%- assign df = "%b %-d, %Y" -%}
		<p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: df }}</time></p>
	</header>

	<div class="post-content glass">
		{{ content }}
	</div>
</article>
