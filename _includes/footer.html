{%- assign t = site.data.i18n[site.lang] -%}
{%- assign en = site.data.i18n.en -%}
<footer class="site-footer">
	<div class="container site-footer-inner">
		<p class="copyright">© {{ site.time | date: '%Y' }} {{ site.profile.name }}. <span data-es="{{ t.footer.rights }}" data-en="{{ en.footer.rights }}">{{ t.footer.rights }}</span></p>
		<p class="built" data-es="{{ t.footer.built }}" data-en="{{ en.footer.built }}">{{ t.footer.built }}</p>
	</div>
</footer>
